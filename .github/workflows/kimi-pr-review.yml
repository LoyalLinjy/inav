name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR Info
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "base_ref=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "base_ref=master" >> $GITHUB_OUTPUT
          fi
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          BASE_REF: ${{ steps.pr_info.outputs.base_ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "PR Number: $PR_NUMBER"
          echo "Base Ref: $BASE_REF"
          
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF..HEAD > /tmp/diff.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          # 把环境变量传给Python
          export PR_NUM="$PR_NUMBER"
          export REPO_NAME="$REPO"
          export KIMI_KEY="$KIMI_API_KEY"
          export GITHUB_TOK="$GITHUB_TOKEN"
          
          python3 << 'PYEOF'
          import os, json, urllib.request

          pr_num = os.environ['PR_NUM']
          repo_name = os.environ['REPO_NAME']
          kimi_key = os.environ['KIMI_KEY']
          github_tok = os.environ['GITHUB_TOK']

          with open('/tmp/diff.txt', 'r') as f:
              diff = f.read()[:8000]

          payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                  },
                  {
                      "role": "user",
                      "content": f"Review this code diff:\n\n{diff}"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.moonshot.cn/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f'Bearer {kimi_key}', "Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              review = result['choices'][0]['message']['content']

          comment = {"body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"}
          
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo_name}/issues/{pr_num}/comments",
              data=json.dumps(comment).encode(),
              headers={"Authorization": f'token {github_tok}', "Accept": "application/vnd.github.v3+json"}
          )
          urllib.request.urlopen(req2)
          print("Review posted successfully!")
          PYEOF
