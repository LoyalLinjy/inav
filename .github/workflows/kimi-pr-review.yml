name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR Diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD > pr_diff.txt
          head -c 15000 pr_diff.txt > pr_diff_truncated.txt
          echo "DIFF_B64=$(base64 -w 0 pr_diff_truncated.txt)" >> $GITHUB_ENV
      
      - name: Request Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(echo "$DIFF_B64" | base64 -d)
          
          JSON_PAYLOAD=$(jq -n \
            --arg model "kimi-k2" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are a professional code reviewer. Analyze the code changes and provide a bilingual report in this exact format:\n\n## 中文审查报告\n\n**变更总结**: (中文简述做了什么)\n**问题与建议**: (中文列出潜在问题)\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**: (English description of changes)\n**Issues & Suggestions**: (English list)\n**Rating**: X/5 stars\n\nKeep both sections professional and concise."
                },
                {
                  role: "user",
                  content: "Please review this code diff:\n\n\($diff)"
                }
              ]
            }')
          
          RESPONSE=$(curl -s -X POST "https://api.moonshot.cn/v1/chat/completions" \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")
          
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "API call failed, please check KIMI_API_KEY configuration"')
          
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\":\"## 🤖 Kimi Code Review Report\\n\\n$REVIEW\\n\\n---\\n*Generated by Kimi AI*\"}"
