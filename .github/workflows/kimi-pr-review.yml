name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR Diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD > /tmp/pr_diff.txt
          # 截取前15000字符避免超长
          head -c 15000 /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
      
      - name: Request Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取diff内容
          DIFF=$(cat /tmp/pr_diff_truncated.txt)
          
          # 构造JSON请求体，使用文件避免环境变量问题
          cat > /tmp/payload.json << 'JSONEOF'
          {
            "model": "kimi-k2",
            "messages": [
              {
                "role": "system",
                "content": "You are a professional code reviewer. Analyze the code changes and provide a bilingual report in this exact format:\n\n## 中文审查报告\n\n**变更总结**: (中文简述做了什么改动)\n**问题与建议**: (中文列出潜在问题或改进建议)\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**: (English description of changes)\n**Issues & Suggestions**: (English list of issues/improvements)\n**Rating**: X/5 stars\n\nKeep both sections professional and concise."
              },
              {
                "role": "user",
                "content": "Please review this code diff:\n\nDIFF_PLACEHOLDER"
              }
            ]
          }
          JSONEOF
          
          # 将diff内容插入JSON（转义特殊字符）
          DIFF_ESCAPED=$(echo "$DIFF" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\t/\\t/g' | tr '\n' ' ' | sed 's/  */ /g')
          sed -i "s/DIFF_PLACEHOLDER/$DIFF_ESCAPED/g" /tmp/payload.json
          
          # 调用Kimi API
          curl -s -X POST "https://api.moonshot.cn/v1/chat/completions" \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json > /tmp/response.json
          
          # 提取回复
          REVIEW=$(cat /tmp/response.json | jq -r '.choices[0].message.content // "API call failed, please check KIMI_API_KEY configuration"')
          
          # 提交PR评论
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          # 使用jq构造评论JSON避免转义问题
          echo "$REVIEW" | jq -Rs '{"body": "## 🤖 Kimi Code Review Report\n\n\(.)"}' > /tmp/comment.json
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d @/tmp/comment.json \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments"
