name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess

          pr_number = "${{ github.event.inputs.pr_number }}"
          repo = "${{ github.repository }}"
          
          # 获取PR分支代码
          subprocess.run(["git", "fetch", "origin", f"pull/{pr_number}/head:pr_branch"], check=True, capture_output=True)
          subprocess.run(["git", "checkout", "pr_branch"], check=True, capture_output=True)
          result = subprocess.run(["git", "diff", "origin/master..pr_branch"], capture_output=True, text=True)
          diff = result.stdout[:10000]

          # 调用Kimi API
          payload = {
              "model": "kimi-k2",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个代码审查助手。提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                  },
                  {
                      "role": "user",
                      "content": f"Review this code diff:\n\n{diff}"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.moonshot.cn/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f'Bearer {os.environ["KIMI_API_KEY"]}', "Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as r:
              review = json.loads(r.read())["choices"][0]["message"]["content"]

          # 提交PR评论
          comment = {"body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"}
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=json.dumps(comment).encode(),
              headers={"Authorization": f'token {os.environ["GITHUB_TOKEN"]}', "Accept": "application/vnd.github.v3+json"}
          )
          urllib.request.urlopen(req2)
          print("Review posted!")
          PYEOF
