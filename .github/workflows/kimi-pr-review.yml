name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 诊断：检查API Key
          echo "=== Checking API Key ==="
          echo "Key length: ${#KIMI_API_KEY}"
          echo "Key prefix: ${KIMI_API_KEY:0:10}..."
          
          # 诊断：测试API连接
          echo "=== Testing API Connection ==="
          curl -s -H "Authorization: Bearer $KIMI_API_KEY" \
            https://api.moonshot.cn/v1/models | head -200
          
          # 获取diff
          git fetch origin pull/${{ github.event.inputs.pr_number }}/head:pr_branch
          git checkout pr_branch
          git diff origin/master..pr_branch | head -c 5000 > /tmp/diff.txt
          
          echo "=== Diff size ==="
          wc -c /tmp/diff.txt
          
          # 调用Kimi API
          echo "=== Calling Kimi API ==="
          cat > /tmp/payload.json << 'JSONEND'
          {
            "model": "moonshot-v1-8k",
            "messages": [
              {
                "role": "system",
                "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
              },
              {
                "role": "user",
                "content": "Review this code diff:\n\nDIFF_CONTENT"
              }
            ]
          }
          JSONEND
          
          # 替换diff内容（简单转义）
          DIFF_ESCAPED=$(cat /tmp/diff.txt | sed 's/\\/\\\\/g; s/"/\\"/g' | tr '\n' ' ')
          sed -i "s/DIFF_CONTENT/$DIFF_ESCAPED/g" /tmp/payload.json
          
          # 调用API
          curl -s -X POST \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            https://api.moonshot.cn/v1/chat/completions > /tmp/response.json
          
          echo "=== API Response ==="
          cat /tmp/response.json
          
          # 提取评论内容
          REVIEW=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'] if 'choices' in d else d.get('error', 'Unknown error'))")
          
          echo "=== Posting Comment ==="
          # 提交到PR
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"body\":\"## 🤖 Kimi Code Review Report\\n\\n$REVIEW\\n\\n---\\n*Generated by Kimi AI*\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.inputs.pr_number }}/comments"
          
          echo "=== Done ==="
