name: Kimi PR Review

on:
  # 自动触发：PR创建或更新时
  pull_request:
    types: [opened, synchronize]
  
  # 手动触发
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取PR信息（自动或手动）
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BASE_REF="${{ github.event.pull_request.base.ref }}"
          else
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            BASE_REF="master"
          fi
          
          echo "PR Number: $PR_NUMBER"
          echo "Base Ref: $BASE_REF"
          
          # 获取diff
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF..HEAD > /tmp/diff.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          # 调用Kimi API
          python3 << 'PYEOF'
          import os, json, urllib.request

          with open('/tmp/diff.txt', 'r') as f:
              diff = f.read()[:8000]  # 限制长度

          payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                  },
                  {
                      "role": "user",
                      "content": f"Review this code diff:\n\n{diff}"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.moonshot.cn/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f'Bearer {os.environ["KIMI_API_KEY"]}', "Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              review = result['choices'][0]['message']['content']

          comment = {"body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"}
          
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=json.dumps(comment).encode(),
              headers={"Authorization": f'token {os.environ["GITHUB_TOKEN"]}', "Accept": "application/vnd.github.v3+json"}
          )
          urllib.request.urlopen(req2)
          print("Done!")
          PYEOF
