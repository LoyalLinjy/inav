name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, subprocess

          pr_number = "${{ github.event.inputs.pr_number }}"
          repo = "${{ github.repository }}"
          
          try:
              # 获取PR的代码
              subprocess.run(["git", "fetch", "origin", f"pull/{pr_number}/head:pr_branch"], check=True, capture_output=True)
              subprocess.run(["git", "checkout", "pr_branch"], check=True, capture_output=True)
              result = subprocess.run(["git", "diff", "origin/master..pr_branch"], capture_output=True, text=True)
              diff = result.stdout[:8000]

              print(f"Diff length: {len(diff)} chars")

              # 调用Kimi API
              payload = {
                  "model": "moonshot-v1-8k",  # 使用标准模型名
                  "messages": [
                      {
                          "role": "system", 
                          "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                      },
                      {
                          "role": "user",
                          "content": f"Review this code diff:\n\n{diff}"
                      }
                  ],
                  "temperature": 0.3
              }

              req = urllib.request.Request(
                  "https://api.moonshot.cn/v1/chat/completions",
                  data=json.dumps(payload).encode('utf-8'),
                  headers={
                      "Authorization": f'Bearer {os.environ["KIMI_API_KEY"]}',
                      "Content-Type": "application/json"
                  }
              )

              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      response_body = r.read().decode('utf-8')
                      result = json.loads(response_body)
                      review = result['choices'][0]['message']['content']
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8')
                  print(f"API Error: {error_body}")
                  review = f"API Error {e.code}: 请检查KIMI_API_KEY是否正确，或模型名称是否支持"

              # 提交PR评论
              comment = {"body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"}
              req2 = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
                  data=json.dumps(comment).encode('utf-8'),
                  headers={
                      "Authorization": f'token {os.environ["GITHUB_TOKEN"]}',
                      "Accept": "application/vnd.github.v3+json"
                  }
              )
              
              with urllib.request.urlopen(req2) as r:
                  print(f"Comment posted: {r.status}")
                  
          except Exception as e:
              print(f"Error: {str(e)}")
              raise

          PYEOF
