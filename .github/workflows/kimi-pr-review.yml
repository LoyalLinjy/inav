name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD | head -c 10000 > /tmp/diff.txt
          
          python3 -c "
          import os, json, urllib.request
          
          with open('/tmp/diff.txt') as f:
              diff = f.read()
          
          payload = {
              'model': 'kimi-k2',
              'messages': [
                  {'role': 'system', 'content': '你是一个专业的代码审查助手。请分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars'},
                  {'role': 'user', 'content': f'Review this diff:\\n{diff}'}
              ]
          }
          
          req = urllib.request.Request(
              'https://api.moonshot.cn/v1/chat/completions',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {os.environ[\"KIMI_API_KEY\"]}', 'Content-Type': 'application/json'}
          )
          
          with urllib.request.urlopen(req) as r:
              review = json.loads(r.read())['choices'][0]['message']['content']
          
          comment = {'body': f'## 🤖 Kimi Code Review Report\\n\\n{review}\\n\\n---\\n*Generated by Kimi AI*'}
          req2 = urllib.request.Request(
              f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/issues/${{ github.event.pull_request.number }}/comments',
              data=json.dumps(comment).encode(),
              headers={'Authorization': f'token {os.environ[\"GITHUB_TOKEN\"]}', 'Accept': 'application/vnd.github.v3+json'}
          )
          urllib.request.urlopen(req2)
          "
