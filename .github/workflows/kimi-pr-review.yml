name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR Info
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "base_ref=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "base_ref=master" >> $GITHUB_OUTPUT
          fi
      
      - name: Kimi Review & PR Description
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          BASE_REF: ${{ steps.pr_info.outputs.base_ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "PR Number: $PR_NUMBER"
          echo "Base Ref: $BASE_REF"
          
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF..HEAD > /tmp/diff.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          export PR_NUM="$PR_NUMBER"
          export REPO_NAME="$REPO"
          export KIMI_KEY="$KIMI_API_KEY"
          export GITHUB_TOK="$GITHUB_TOKEN"
          
          python3 << 'PYEOF'
          import os, json, urllib.request

          pr_num = os.environ['PR_NUM']
          repo_name = os.environ['REPO_NAME']
          kimi_key = os.environ['KIMI_KEY']
          github_tok = os.environ['GITHUB_TOK']

          with open('/tmp/diff.txt', 'r') as f:
              diff = f.read()[:8000]

          # 第一个API调用：代码审查（中英双语挑刺）
          review_payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是资深嵌入式代码审查员。请严格审查代码变更，找出潜在问题。\n\n必须输出双语：\n\n## 🔍 中文审查报告\n\n**变更总结**：\n**发现的问题**：\n**改进建议**：\n**评分**：X/5\n\n---\n\n## 🔍 Code Review Report (English)\n\n**Summary**: \n**Issues Found**: \n**Suggestions**: \n**Rating**: X/5"
                  },
                  {
                      "role": "user",
                      "content": f"请审查以下代码变更，用中英文双语输出：\n\n{diff}"
                  }
              ]
          }

          req1 = urllib.request.Request(
              "https://api.moonshot.cn/v1/chat/completions",
              data=json.dumps(review_payload).encode(),
              headers={"Authorization": f'Bearer {kimi_key}', "Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req1) as r:
              result1 = json.loads(r.read())
              review_report = result1['choices'][0]['message']['content']

          # 第二个API调用：PR描述（中英双语推销改动）
          pr_payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是开源项目贡献者，擅长撰写专业的Pull Request描述。\n\n必须输出双语：\n\n## 📝 PR描述（中文）\n\n**摘要**：\n**变更内容**：\n**技术细节**：\n**测试结果**：\n**兼容性**：\n\n---\n\n## 📝 PR Description (English)\n\n**Summary**: \n**Changes**: \n**Technical Details**: \n**Testing**: \n**Compatibility**: "
                  },
                  {
                      "role": "user",
                      "content": f"请为以下代码变更撰写PR描述，用中英文双语输出：\n\n{diff}"
                  }
              ]
          }

          req2 = urllib.request.Request(
              "https://api.moonshot.cn/v1/chat/completions",
              data=json.dumps(pr_payload).encode(),
              headers={"Authorization": f'Bearer {kimi_key}', "Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req2) as r:
              result2 = json.loads(r.read())
              pr_description = result2['choices'][0]['message']['content']

          # 合并输出
          full_comment = f"""## 🤖 Kimi AI 分析报告

---

{review_report}

---

{pr_description}

---

*Generated by Kimi AI*"""

          comment = {"body": full_comment}
          
          req3 = urllib.request.Request(
              f"https://api.github.com/repos/{repo_name}/issues/{pr_num}/comments",
              data=json.dumps(comment).encode(),
              headers={"Authorization": f'token {github_tok}', "Accept": "application/vnd.github.v3+json"}
          )
          urllib.request.urlopen(req3)
          print("Bilingual dual-output review posted successfully!")
          PYEOF
