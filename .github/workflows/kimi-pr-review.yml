name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Diagnose and Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== Step 1: Check API Key ==="
          echo "Key length: ${#KIMI_API_KEY}"
          if [ -z "$KIMI_API_KEY" ]; then
            echo "ERROR: KIMI_API_KEY is empty!"
            exit 1
          fi
          echo "Key prefix: ${KIMI_API_KEY:0:15}..."
          
          echo ""
          echo "=== Step 2: Test API Connection ==="
          curl -s -H "Authorization: Bearer $KIMI_API_KEY" \
            https://api.moonshot.cn/v1/models | head -c 500
          echo ""
          
          echo ""
          echo "=== Step 3: Get PR Diff ==="
          git fetch origin pull/$PR_NUMBER/head:pr_branch
          git checkout pr_branch
          git diff origin/master..pr_branch | head -c 4000 > /tmp/diff.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          echo ""
          echo "=== Step 4: Call Kimi API ==="
          # 创建JSON payload
          python3 << 'PYJSON'
          import json
          
          with open('/tmp/diff.txt', 'r') as f:
              diff = f.read()
          
          payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                  },
                  {
                      "role": "user",
                      "content": f"Review this code diff:\n\n{diff}"
                  }
              ]
          }
          
          with open('/tmp/payload.json', 'w') as f:
              json.dump(payload, f)
          
          print("Payload ready")
          PYJSON
          
          # 调用API并捕获完整响应
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/response.json \
            -X POST \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            https://api.moonshot.cn/v1/chat/completions)
          
          echo "HTTP Response Code: $HTTP_CODE"
          echo "API Response:"
          cat /tmp/response.json
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo ""
            echo "ERROR: API call failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo ""
          echo "=== Step 5: Extract Review ==="
          REVIEW=$(python3 -c "
          import json
          with open('/tmp/response.json', 'r') as f:
              data = json.load(f)
          print(data['choices'][0]['message']['content'])
          ")
          echo "Review extracted: ${REVIEW:0:200}..."
          
          echo ""
          echo "=== Step 6: Post Comment ==="
          # 保存评论到文件
          python3 << 'PYCOMMENT'
          import json
          
          with open('/tmp/response.json', 'r') as f:
              data = json.load(f)
          
          review = data['choices'][0]['message']['content']
          comment = {
              "body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"
          }
          
          with open('/tmp/comment.json', 'w') as f:
              json.dump(comment, f)
          PYCOMMENT
          
          # 提交评论
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d @/tmp/comment.json \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments"
          
          echo ""
          echo "=== Done ==="
