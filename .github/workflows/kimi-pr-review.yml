name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== Starting Review ==="
          
          # 获取PR代码
          git fetch origin pull/$PR_NUMBER/head:pr_branch
          git checkout pr_branch
          git diff origin/master..pr_branch > /tmp/diff_raw.txt
          head -c 4000 /tmp/diff_raw.txt > /tmp/diff.txt
          
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          # 创建JSON payload（使用Python处理JSON转义）
          python3 << 'PYSCRIPT'
          import json
          
          with open('/tmp/diff.txt', 'r') as f:
              diff = f.read()
          
          payload = {
              "model": "kimi-k2-turbo-preview",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
                  },
                  {
                      "role": "user",
                      "content": f"Review this code diff:\n\n{diff}"
                  }
              ]
          }
          
          with open('/tmp/payload.json', 'w') as f:
              json.dump(payload, f)
          
          print("Payload created")
          PYSCRIPT
          
          # 调用Kimi API
          echo "=== Calling Kimi API ==="
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            https://api.moonshot.cn/v1/chat/completions)
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/response.json
          
          # 提取评论内容
          REVIEW=$(python3 -c "
          import json
          import sys
          try:
              with open('/tmp/response.json', 'r') as f:
                  data = json.load(f)
              if 'choices' in data:
                  print(data['choices'][0]['message']['content'])
              elif 'error' in data:
                  print(f\"API Error: {data['error']}\")
              else:
                  print(f\"Unexpected response: {data}\")
          except Exception as e:
              print(f\"Parse error: {e}\")
          ")
          
          echo "Review extracted: ${REVIEW:0:100}..."
          
          # 提交到PR
          echo "=== Posting Comment ==="
          python3 << 'PYSCRIPT2'
          import json
          import urllib.request
          import os
          
          with open('/tmp/response.json', 'r') as f:
              data = json.load(f)
          
          if 'choices' in data:
              review = data['choices'][0]['message']['content']
          else:
              review = f"Error: {data.get('error', 'Unknown error')}"
          
          comment = {
              "body": f"## 🤖 Kimi Code Review Report\n\n{review}\n\n---\n*Generated by Kimi AI*"
          }
          
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=json.dumps(comment).encode(),
              headers={
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          
          with urllib.request.urlopen(req) as r:
              print(f"Comment posted: {r.status}")
          PYSCRIPT2
          
          echo "=== Done ==="
