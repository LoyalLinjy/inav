name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR Diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD > pr_diff.txt
          echo "diff_content=$(cat pr_diff.txt | head -c 10000)" >> $GITHUB_ENV
      
      - name: Request Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF="${{ env.diff_content }}"
          
          JSON_PAYLOAD=$(jq -n \
            --arg model "kimi-k2" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "你是一位资深代码审查员。请分析代码变更，用中文提供：1)PR变更总结 2)代码问题或建议 3)评分(1-5星)。保持简洁专业。"
                },
                {
                  role: "user",
                  content: "请审查以下代码diff：\n\n\($diff)"
                }
              ]
            }')
          
          RESPONSE=$(curl -s -X POST "https://api.moonshot.cn/v1/chat/completions" \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")
          
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "API调用失败，请检查KIMI_API_KEY配置"')
          
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\":\"## 🤖 Kimi 代码审查报告\\n\\n$REVIEW\"}"
