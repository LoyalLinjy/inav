name: Kimi PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request

          # 获取diff
          import subprocess
          subprocess.run(['git', 'fetch', 'origin', os.environ.get('GITHUB_BASE_REF', 'master')], check=True)
          result = subprocess.run(['git', 'diff', f'origin/{os.environ.get("GITHUB_BASE_REF", "master")}..HEAD'], 
                                capture_output=True, text=True)
          diff = result.stdout[:12000]

          # 调用Kimi
          payload = {
              "model": "kimi-k2",
              "messages": [
                  {"role": "system", "content": "你是一个专业的代码审查助手。请分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"},
                  {"role": "user", "content": f"Review this diff:\\n{diff}"}
              ]
          }

          req = urllib.request.Request(
              'https://api.moonshot.cn/v1/chat/completions',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {os.environ["KIMI_API_KEY"]}', 'Content-Type': 'application/json'}
          )

          with urllib.request.urlopen(req) as r:
              review = json.loads(r.read())['choices'][0]['message']['content']

          # 提交评论
          comment = {"body": f"## 🤖 Kimi Code Review Report\\n\\n{review}"}
          creq = urllib.request.Request(
              f'https://api.github.com/repos/{os.environ["REPO"]}/issues/{os.environ["PR_NUMBER"]}/comments',
              data=json.dumps(comment).encode(),
              headers={'Authorization': f'token {os.environ["GITHUB_TOKEN"]}', 'Accept': 'application/vnd.github.v3+json'}
          )
          urllib.request.urlopen(creq)
          print("Done!")
          EOF
