name: Kimi PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        default: '2'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Kimi Review
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取PR代码
          git fetch origin pull/${{ github.event.inputs.pr_number }}/head:pr_branch
          git checkout pr_branch
          git diff origin/master..pr_branch | head -c 5000 > /tmp/diff.txt
          
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"
          
          # 使用API Key测试时验证通过的模型 kimi-k2-turbo-preview
          cat > /tmp/payload.json << 'JSONEND'
          {
            "model": "kimi-k2-turbo-preview",
            "messages": [
              {
                "role": "system",
                "content": "你是一个代码审查助手。分析代码变更，提供双语报告：\n\n## 中文审查报告\n\n**变更总结**:\n**问题与建议**:\n**代码评分**: X/5\n\n---\n\n## English Review Report\n\n**Summary**:\n**Issues & Suggestions**:\n**Rating**: X/5 stars"
              },
              {
                "role": "user",
                "content": "Review this code diff:\n\nDIFF_PLACEHOLDER"
              }
            ]
          }
          JSONEND
          
          # 简单处理diff内容
          DIFF=$(cat /tmp/diff.txt | sed 's/\\/\\\\/g; s/"/\\"/g; s/\t/\\t/g' | tr '\n' ' ')
          sed -i "s/DIFF_PLACEHOLDER/$DIFF/g" /tmp/payload.json
          
          # 调用API
          curl -s -X POST \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            https://api.moonshot.cn/v1/chat/completions > /tmp/response.json
          
          echo "API Response:"
          cat /tmp/response.json
          
          # 提取评论
          REVIEW=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'] if 'choices' in d else 'Error: ' + str(d))")
          
          # 提交到PR
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"body\":\"## 🤖 Kimi Code Review Report\\n\\n$REVIEW\\n\\n---\\n*Generated by Kimi AI*\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.inputs.pr_number }}/comments"
          
          echo "Done!"
